<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kaori Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dashboard.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="fas fa-robot me-2"></i>
                <strong>Kaori Dashboard</strong>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="/">
                            <i class="fas fa-home me-1"></i>Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'commands' %}active{% endif %}" href="/commands">
                            <i class="fas fa-terminal me-1"></i>Comandos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'faq' %}active{% endif %}" href="/faq">
                            <i class="fas fa-question-circle me-1"></i>FAQ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'support' %}active{% endif %}" href="/support">
                            <i class="fas fa-headset me-1"></i>Suporte
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'tutorials' %}active{% endif %}" href="/tutorials">
                            <i class="fas fa-graduation-cap me-1"></i>Tutoriais
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <div class="row">
                <div class="col-md-6">
                    <h5><i class="fas fa-robot me-2"></i>Kaori</h5>
                    <p>Bot Discord completo com sistema de copinhas do Stumble Guys</p>
                </div>
                <div class="col-md-6">
                    <h5>Links Úteis</h5>
                    <div class="d-flex justify-content-center gap-3">
                        <a href="/commands" class="text-light"><i class="fas fa-terminal"></i> Comandos</a>
                        <a href="/faq" class="text-light"><i class="fas fa-question"></i> FAQ</a>
                        <a href="/support" class="text-light"><i class="fas fa-headset"></i> Suporte</a>
                    </div>
                </div>
            </div>
            <hr class="my-3">
            <p class="mb-0">&copy; 2025 Kaori Dashboard. Sistema de torneios Stumble Guys.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
